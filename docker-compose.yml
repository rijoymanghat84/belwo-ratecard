services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://belwo:belwo_dev@db:5432/belwo_ratecard
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-replace-me-in-production}
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: belwo
      POSTGRES_PASSWORD: belwo_dev
      POSTGRES_DB: belwo_ratecard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U belwo -d belwo_ratecard"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
